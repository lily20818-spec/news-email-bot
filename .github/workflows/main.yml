name: Send Daily News Email

on:
  schedule:
    - cron: '0 8 * * *'  # 每天台灣下午4點（UTC+8）
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run script
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWS_RECIPIENT: ${{ secrets.NEWS_RECIPIENT }}
        run: |
          python rss_top_titles.py
